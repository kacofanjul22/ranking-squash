<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Squash Tucumán 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1117;--surface:#111920;--surface2:#162030;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eef5;--muted:#5a7a9a;--accent:#00c4ff;--ca:#c084fc;--cb:#38bdf8;--cc:#4ade80;--cd:#fb923c;--up:#34d399;--down:#f87171;--warn:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}

header{background:var(--surface);border-bottom:1px solid var(--border2);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);}
.logo span{color:var(--text);}
.hdr-right{text-align:right;}
.hdr-titulo{font-size:13px;font-weight:600;color:var(--text);}
.hdr-sync{font-size:11px;color:var(--muted);}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin-right:4px;vertical-align:middle;}
.sync-dot.ok{background:var(--up);}
.sync-dot.err{background:var(--down);}
.sync-dot.loading{background:var(--warn);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;}
.tab-btn{padding:14px 20px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .2s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

main{max-width:860px;margin:0 auto;padding:24px 16px;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;gap:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:13px;color:var(--muted);}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.stat-val{font-size:14px;font-weight:600;color:var(--text);}

.cat-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.cat-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;}
.cat-btn.active{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.cat-btn.act-a{background:rgba(192,132,252,.12);color:var(--ca);border-color:var(--ca);}
.cat-btn.act-b{background:rgba(56,189,248,.12);color:var(--cb);border-color:var(--cb);}
.cat-btn.act-c{background:rgba(74,222,128,.12);color:var(--cc);border-color:var(--cc);}
.cat-btn.act-d{background:rgba(251,146,60,.12);color:var(--cd);border-color:var(--cd);}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
tbody tr.hidden-row{display:none;}
td{padding:9px 12px;vertical-align:middle;}
.td-pos{width:40px;font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--muted);}
.top1{color:#fbbf24;}.top2{color:#94a3b8;}.top3{color:#b87333;}
.td-name{font-weight:500;color:var(--text);}
.td-var{width:72px;text-align:center;}
.cat-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.pill-a{background:rgba(192,132,252,.15);color:var(--ca);border:1px solid rgba(192,132,252,.3);}
.pill-b{background:rgba(56,189,248,.15);color:var(--cb);border:1px solid rgba(56,189,248,.3);}
.pill-c{background:rgba(74,222,128,.15);color:var(--cc);border:1px solid rgba(74,222,128,.3);}
.pill-d{background:rgba(251,146,60,.15);color:var(--cd);border:1px solid rgba(251,146,60,.3);}
.var-up{color:var(--up);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:3px;}
.var-down{color:var(--down);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:3px;}
.var-same{color:var(--muted);display:flex;justify-content:center;}
.arr-u{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:6px solid var(--up);}
.arr-d{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid var(--down);}
.dot-same{width:5px;height:5px;border-radius:50%;background:var(--muted);}

.partido{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.p-match{font-size:13px;font-weight:500;}
.p-ganador{color:var(--accent);}
.p-perdedor{color:var(--muted);}
.p-result{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);text-align:right;}
.p-sub{font-size:11px;color:var(--muted);display:block;text-align:right;margin-top:2px;}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr;}
  header{padding:0 12px;}
  .logo{font-size:20px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">SQUASH <span>TUC</span></div>
  <div class="hdr-right">
    <div class="hdr-titulo">Ranking 2026 - Fecha 2</div>
    <div class="hdr-sync">
      <span class="sync-dot loading" id="sync-dot"></span>
      <span id="sync-txt">Cargando...</span>
    </div>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="goTab('ranking',this)">Ranking general</button>
  <button class="tab-btn" onclick="goTab('resultados',this)">Resultados</button>
  <button class="tab-btn" onclick="goTab('reglamento',this)">Reglamento</button>
</nav>

<main>
  <div id="tab-ranking" class="tab-content active">
    <div id="ranking-loader" class="loader">
      <div class="spinner"></div>
      <div class="loader-txt">Cargando ranking manual...</div>
    </div>
    <div id="ranking-content" style="display:none">
      <div class="stats">
        <div class="stat"><div class="stat-label">Líder</div><div class="stat-val" id="stat-lider">—</div></div>
        <div class="stat"><div class="stat-label">Mayor subida</div><div class="stat-val" id="stat-sube" style="color:var(--up)">—</div></div>
        <div class="stat"><div class="stat-label">Mayor caída</div><div class="stat-val" id="stat-baja" style="color:var(--down)">—</div></div>
      </div>
      <div class="cat-filter">
        <button class="cat-btn active" onclick="filterCat('todos',this)">Todos</button>
        <button class="cat-btn" onclick="filterCat('A',this)">Bombo A</button>
        <button class="cat-btn" onclick="filterCat('B',this)">Bombo B</button>
        <button class="cat-btn" onclick="filterCat('C',this)">Bombo C</button>
        <button class="cat-btn" onclick="filterCat('D',this)">Bombo D</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Jugador</th><th>Bombo</th><th style="text-align:center">Variación</th></tr></thead>
          <tbody id="ranking-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-resultados" class="tab-content">
    <div id="resultados-loader" class="loader">
      <div class="spinner"></div>
      <div class="loader-txt">Cargando resultados de la planilla...</div>
    </div>
    <div id="resultados-content" style="display:none">
      <div class="fecha-selector">
        <label>Ver fecha:</label>
        <select class="fecha-select" id="fecha-select" onchange="mostrarFecha(this.value)"></select>
      </div>
      <div id="partidos-list"></div>
    </div>
  </div>

  <div id="tab-reglamento" class="tab-content">
    <div style="color:var(--muted); line-height:1.6;">
        <p>Reglamento disponible en la pestaña de la asociación.</p>
    </div>
  </div>
</main>

<script>
// ─── CONFIGURACIÓN DE DATOS ──────────────────────────────────────────────────
const SHEET_ID = "1w2nWgdB_ZBoA8EQhwf86ahNlE2O4dhQUVI7aUQRm76Y";
const GID_JUG  = "41624303";
const GID_RES  = "0";

// AQUÍ CARGAS EL RANKING MANUALMENTE CADA FECHA
const RANKING_MANUAL = [
    "Javi foguet", "Barraquero", "Marcelo Navarro", "Fer gh", "Jc",
    "Gury", "Gabi flores", "Kechu", "Sergio jorrat", "José Andrés",
    "Leo mosi", "Fabri", "Turkitooo", "Fer Martínez", "Mariano pardo",
    "Loi", "Chino Montero", "Luis b", "Chino z", "Fede staff", "Pachi",
    "Raul Albesa", "Pondal", "Tomi", "Jauretche", "Catu", "Diosque",
    "Pajarito", "Marangoni", "Lucas Mario", "Juan pasteris", "Tanque",
    "maxi mellace", "Márchese", "Varela", "Arañaaaaaa", "Tizi", "Bernasconi",
    "Elias Mario", "Bauti gallardo", "Benejam", "Jm", "moncho gallardo",
    "Saracho", "Abuin", "Clo", "Muge", "Ana Inés",
    "Torres Matia", "Golden", "Hernán honorato", "Sole", "Cueto", "Luis allier",
    "Emi Pereyra", "Fanjul Queen", "cuchu guiudice", "Alfredo barberís", "Marion",
    "Rulo azaresky", "Juampi Salomón", "Metralleta", "Sil re", "Jp",
    "Luis Martinez m", "Vir jaiara", "Agus", "Leandro Suárez", "Ferri",
    "Bruno Villarreal", "Manuel", "Dani licudis", "Churro", "Aime",
    "Melli", "Fede roda", "Vane silvera", "Negro Ledesma", "Gi Salomón",
    "Nacho malmierca", "Sandoval", "Ceci Córdoba", "Viví Belmont", "coni",
    "denis", "meli", "luciana guiudice"
];

// ─── LÓGICA DEL SISTEMA ──────────────────────────────────────────────────────
let jugadoresData = [];
let resultadosData = [];
let rankingFinal = [];
let currentCat = "todos";

function csvUrl(gid) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&cb=${Date.now()}`; }

async function fetchCSV(gid) {
    const res = await fetch(csvUrl(gid));
    const text = await res.text();
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.trim().toUpperCase().replace(/"/g, ''));
    return lines.slice(1).map(line => {
        const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
        const obj = {};
        headers.forEach((h, i) => obj[h] = vals[i] || "");
        return obj;
    });
}

function normalizar(txt) {
    return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function calcRanking(jug) {
    // Mapeamos la lista manual con los datos de bombos y pos_inicial de la planilla
    return RANKING_MANUAL.map((nombre, index) => {
        const match = jug.find(j => normalizar(j.NOMBRE) === normalizar(nombre));
        const posActual = index + 1;
        const posInicial = match ? parseInt(match.POS_INICIAL) : posActual;
        
        return {
            pos: posActual,
            nombre: nombre,
            bombo: match ? match.BOMBO.toUpperCase() : "B",
            var: posInicial - posActual
        };
    });
}

function renderRanking() {
    const tbody = document.getElementById("ranking-tbody");
    tbody.innerHTML = "";
    let maxUp = -99, maxDown = 99, topUp = "—", topDown = "—";

    rankingFinal.forEach(p => {
        if (p.var > maxUp) { maxUp = p.var; topUp = p.nombre; }
        if (p.var < maxDown) { maxDown = p.var; topDown = p.nombre; }

        const show = currentCat === "todos" || p.bombo === currentCat;
        const posCls = p.pos === 1 ? "top1" : p.pos === 2 ? "top2" : p.pos === 3 ? "top3" : "";
        let varHtml = `<span class="var-same"><span class="dot-same"></span></span>`;
        if (p.var > 0) varHtml = `<span class="var-up"><span class="arr-u"></span>${p.var}</span>`;
        if (p.var < 0) varHtml = `<span class="var-down"><span class="arr-d"></span>${Math.abs(p.var)}</span>`;

        const tr = document.createElement("tr");
        if (!show) tr.classList.add("hidden-row");
        tr.innerHTML = `
            <td class="td-pos ${posCls}">${p.pos}</td>
            <td class="td-name">${p.nombre}</td>
            <td><span class="cat-pill pill-${p.bombo.toLowerCase()}">${p.bombo}</span></td>
            <td class="td-var">${varHtml}</td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById("stat-lider").textContent = rankingFinal[0]?.nombre || "—";
    document.getElementById("stat-sube").textContent  = maxUp > 0 ? `+${maxUp} · ${topUp}` : "—";
    document.getElementById("stat-baja").textContent  = maxDown < 0 ? `${maxDown} · ${topDown}` : "—";
}

function filterCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active", "act-a", "act-b", "act-c", "act-d"));
    btn.classList.add("active");
    if(cat !== 'todos') btn.classList.add(`act-${cat.toLowerCase()}`);
    renderRanking();
}

function mostrarFecha(fecha) {
    const partidos = resultadosData.filter(r => r.FECHA === fecha);
    let html = "";
    partidos.forEach(r => {
        const gd = parseInt(r.GAMES_D);
        const ga = parseInt(r.GAMES_A);
        const jugado = !isNaN(gd) && !isNaN(ga);
        
        let matchHtml = `<span>${r.DESAFIANTE}</span> <span style="color:var(--muted)">vs</span> <span>${r.ACEPTANTE}</span>`;
        if (jugado) {
            const ganD = gd > ga;
            matchHtml = `<span class="${ganD?'p-ganador':''}">${r.DESAFIANTE}</span> <span style="color:var(--muted)">vs</span> <span class="${!ganD?'p-ganador':''}">${r.ACEPTANTE}</span>`;
        }

        html += `
            <div class="partido">
                <div class="p-match">${matchHtml}</div>
                <div class="p-result">
                    ${jugado ? gd + "—" + ga : '<span style="font-size:11px; color:var(--warn)">PENDIENTE</span>'}
                    ${jugado ? '<span class="p-sub">GAMES</span>' : ''}
                </div>
            </div>`;
    });
    document.getElementById("partidos-list").innerHTML = html || "<p>No hay partidos cargados para esta fecha.</p>";
}

async function loadAll() {
    document.getElementById("sync-txt").textContent = "Sincronizando...";
    try {
        [jugadoresData, resultadosData] = await Promise.all([fetchCSV(GID_JUG), fetchCSV(GID_RES)]);
        rankingFinal = calcRanking(jugadoresData);
        
        document.getElementById("ranking-loader").style.display = "none";
        document.getElementById("resultados-loader").style.display = "none";
        document.getElementById("ranking-content").style.display = "block";
        document.getElementById("resultados-content").style.display = "block";

        renderRanking();
        
        const fechas = [...new Set(resultadosData.map(r => r.FECHA))].filter(f => f).sort();
        const sel = document.getElementById("fecha-select");
        sel.innerHTML = fechas.map(f => `<option value="${f}">Fecha ${f}</option>`).join("");
        if(fechas.length) {
            sel.value = fechas[fechas.length - 1];
            mostrarFecha(sel.value);
        }

        document.getElementById("sync-dot").className = "sync-dot ok";
        document.getElementById("sync-txt").textContent = "Sincronizado";
    } catch (e) {
        document.getElementById("sync-dot").className = "sync-dot err";
        document.getElementById("sync-txt").textContent = "Error de conexión";
    }
}

function goTab(id, btn) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + id).classList.add("active");
    btn.classList.add("active");
}

loadAll();
</script>
</body>
</html>
