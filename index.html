<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Squash Tucumán 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0e0e0e;
    --white: #f5f2ed;
    --accent: #c8ff00;
    --accent-dark: #9fc400;
    --gray: #1e1e1e;
    --gray2: #2c2c2c;
    --gray3: #444;
    --muted: #888;
    --sector-a: #c8ff00;
    --sector-b: #00d4ff;
    --sector-c: #ff6b35;
    --sector-d: #c471ed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--gray);
    border-bottom: 2px solid var(--accent);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 0;
  }
  .logo-icon {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 22px; height: 22px; }
  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .logo-text p {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .sync-status {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.live { background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* NAV TABS */
  nav {
    background: var(--gray);
    border-bottom: 1px solid var(--gray3);
    display: flex;
    gap: 0;
    padding: 0 2rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .tab {
    padding: 0.85rem 1.4rem;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--white); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* MAIN */
  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* SECTOR TABS */
  .sector-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .sector-btn {
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1.5px solid transparent;
    background: var(--gray2);
    color: var(--muted);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .sector-btn:hover { color: var(--white); }
  .sector-btn.active-a { background: #1a2200; color: var(--sector-a); border-color: var(--sector-a); }
  .sector-btn.active-b { background: #001e26; color: var(--sector-b); border-color: var(--sector-b); }
  .sector-btn.active-c { background: #260d00; color: var(--sector-c); border-color: var(--sector-c); }
  .sector-btn.active-d { background: #1a0026; color: var(--sector-d); border-color: var(--sector-d); }

  /* RANKING TABLE */
  .ranking-table-wrap { overflow-x: auto; }
  .ranking-table {
    width: 100%;
    border-collapse: collapse;
  }
  .ranking-table thead tr {
    border-bottom: 1px solid var(--gray3);
  }
  .ranking-table th {
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 1rem 0.75rem;
  }
  .ranking-table th:first-child { padding-left: 0; }
  .ranking-table tbody tr {
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.15s;
  }
  .ranking-table tbody tr:hover { background: var(--gray2); }
  .ranking-table td {
    padding: 0.85rem 1rem;
    font-size: 0.92rem;
  }
  .ranking-table td:first-child { padding-left: 0; }
  .pos-cell {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--gray3);
    width: 48px;
    text-align: right;
    padding-right: 1rem !important;
  }
  .pos-top { color: var(--accent); }
  .player-name { font-weight: 500; }
  .sector-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .badge-a { background: #1a2200; color: var(--sector-a); }
  .badge-b { background: #001e26; color: var(--sector-b); }
  .badge-c { background: #260d00; color: var(--sector-c); }
  .badge-d { background: #1a0026; color: var(--sector-d); }
  
  /* VARIACION */
  .var-up { color: #4ade80; font-size: 0.75rem; font-weight: 600; }
  .var-down { color: #f87171; font-size: 0.75rem; font-weight: 600; }
  .var-same { color: var(--muted); font-size: 0.75rem; }

  /* RESULTS */
  .fecha-select-wrap {
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .fecha-select-wrap label {
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .fecha-select-wrap select {
    background: var(--gray2);
    color: var(--white);
    border: 1px solid var(--gray3);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.88rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .fecha-select-wrap select:hover { border-color: var(--accent); }

  .match-grid {
    display: grid;
    gap: 10px;
  }
  .match-card {
    background: var(--gray);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border: 1px solid var(--gray2);
  }
  .match-players {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .player-pill {
    font-size: 0.9rem;
    font-weight: 500;
  }
  .vs-sep {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
  }
  .match-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
    min-width: 52px;
    text-align: right;
  }
  .match-score.pending {
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
  }
  .winner-mark { color: var(--accent); font-size: 0.75rem; margin-left: 4px; }
  .loser { color: var(--muted); }

  /* LOADING / ERROR */
  .loading-msg, .error-msg {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 1px;
  }
  .error-msg { color: #ff6b6b; }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    nav { padding: 0 1rem; }
    main { padding: 1.5rem 1rem; }
    .match-card { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .match-score { text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#0e0e0e" stroke-width="2"/>
        <path d="M5 12 Q12 4 19 12 Q12 20 5 12Z" fill="#0e0e0e"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>Ranking 2026</h1>
      <p>Squash · Tucumán</p>
    </div>
  </div>
  <div class="sync-status">
    <span class="dot live" id="sync-dot"></span>
    <span id="sync-text">Cargando...</span>
  </div>
</header>

<nav>
  <button class="tab active" onclick="showTab('ranking', this)">Ranking</button>
  <button class="tab" onclick="showTab('resultados', this)">Resultados</button>
  <button class="tab" onclick="showTab('reglamento', this)">Reglamento</button>
</nav>

<main>
  <div class="panel active" id="panel-ranking">
    <div class="sector-tabs" id="sector-tabs">
      <button class="sector-btn active-a" onclick="showCategoria('todos', this)">Todos</button>
      <button class="sector-btn" onclick="showCategoria('A', this)">Categoría A</button>
      <button class="sector-btn" onclick="showCategoria('B', this)">Categoría B</button>
      <button class="sector-btn" onclick="showCategoria('C', this)">Categoría C</button>
      <button class="sector-btn" onclick="showCategoria('D', this)">Categoría D</button>
    </div>
    <div class="ranking-table-wrap">
      <div id="ranking-content" class="loading-msg">Cargando ranking...</div>
    </div>
  </div>

  <div class="panel" id="panel-resultados">
    <div class="fecha-select-wrap">
      <label>Fecha</label>
      <select id="fecha-select" onchange="renderResultados()">
        <option value="">Cargando...</option>
      </select>
    </div>
    <div class="match-grid" id="resultados-content">
      <div class="loading-msg">Cargando resultados...</div>
    </div>
  </div>

  <div class="panel" id="panel-reglamento">
    <div class="rules-card">
      <p style="color:var(--muted)">Reglamento oficial del torneo.</p>
    </div>
  </div>
</main>

<script>
// --- CONFIGURACIÓN DIRECTA ---
const SHEET_ID = '1w2nWgdB_ZBoA8EQhwf86ahNlE2O4dhQUVI7aUQRm76Y';
const GID_RANKING    = '41624303';
const GID_RESULTADOS = '0';

// LISTA MANUAL PARA LA FECHA 2 (Sincronizada con tus nombres en MAYÚSCULAS)
const RANKING_MANUAL = [
    "JAVIER FOGUET", "ROBERT BARRAQUERO", "MARCE NAVARRO", "FER GH", "JUAN C. ARGOTA",
    "GURY", "GABRIEL FLORES", "KECHU", "SERGIO JORRAT", "JOSE ANDRES",
    "MOSELE", "FABRI", "TURKO NAZAR", "FER MARTINEZ", "MARIANO PARDO",
    "LOI", "CHINO MONTERO", "LUIS B.", "CHINO Z", "FEDE STAFF", "PACHI ARGOTA",
    "RAUL ALBESA", "PONDAL", "TOMI G", "JAURETCHE", "CATU", "DIOSQUE",
    "PAJARITO", "MARANGONI", "ISCHUCK LUCAS", "JUAN PASTERIS", "TANQUE",
    "MELLACE MAXI", "MARCHESE", "VARELA", "ARAÑA", "TIZI", "BERNASCONI",
    "MARITO ELIAS", "BAUTI G", "BENEJAM", "JUAN M ARGOTA", "MONCHO GALLARDO",
    "SARACHO", "ABUIN", "CLO", "MUGE", "ANA INES",
    "TORRES MATIAS", "GOLDEN", "HERNAN HONORATO", "SOLE", "CUETO", "LUIS ALLIER",
    "EMI PEREYRA", "FANJUL QUEEN", "CUCHU GUIUDICE", "ALFRED BARBERIS", "MARION",
    "RULO AZARESTKY", "JUAMPI SALOMON", "METRALLETA", "SIL RE", "JP",
    "LUIS MARTINEZ M.", "VIR JAIRALA", "AGUS", "LEANDRO SUAREZ", "FERRI",
    "BRUNO VILLAREAL", "MANUELA", "DANI LICUDIS", "CHURRO", "AIME",
    "MELLI LEA", "FEDE RODA", "VANE SILVERA", "NEGRO LEDESMA", "GI SALOMON",
    "NACHO MALMIERCA", "SANDOVAL", "CECI CORDOBA", "VIVI BELMONT", "CONI",
    "DENIS", "MELI", "LUCIANA GUIUDICE"
];

let rankingData = [];
let resultadosData = [];
let currentCategoria = 'todos';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

const getCsvUrl = (gid) => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&cb=${Date.now()}`;

async function loadRanking() {
  try {
    const res = await fetch(getCsvUrl(GID_RANKING));
    const text = await res.text();
    const rows = parseCSV(text);
    
    // Procesamos datos de la planilla para obtener bombos y pos_inicial
    const planillaJugadores = rows.slice(1).map(r => ({
      nombre: (r[1] || "").toUpperCase().trim(),
      bombo: (r[2] || "B").toUpperCase().trim(),
      pos_inicial: parseInt(r[3]) || 0
    }));

    // Cruzamos la lista MANUAL con los datos de la planilla
    rankingData = RANKING_MANUAL.map((nombre, index) => {
      const match = planillaJugadores.find(pj => pj.nombre === nombre);
      const posActual = index + 1;
      const posInicial = match ? match.pos_inicial : posActual;
      
      return {
        pos: posActual,
        nombre: nombre,
        categoria: match ? match.bombo : "B",
        variacion: posInicial - posActual
      };
    });

    renderRanking();
  } catch (e) {
    document.getElementById('ranking-content').innerHTML = `<div class="error-msg">Error de conexión con la planilla.</div>`;
    setSyncError();
  }
}

async function loadResultados() {
  try {
    const res = await fetch(getCsvUrl(GID_RESULTADOS));
    const text = await res.text();
    const rows = parseCSV(text);
    
    resultadosData = rows.slice(1).map(row => {
      const fecha = row[0] ? row[0].toString().trim() : '';
      if (!fecha) return null;
      return {
        fecha:      fecha,
        desafiante: (row[1] || '').toUpperCase(),
        aceptante:  (row[2] || '').toUpperCase(),
        games_d:    row[3] !== undefined && row[3] !== '' ? row[3].toString() : null,
        games_a:    row[4] !== undefined && row[4] !== '' ? row[4].toString() : null,
      };
    }).filter(r => r !== null);

    populateFechaSelect();
    renderResultados();
  } catch (e) {
    setSyncError();
  }
}

function renderRanking() {
  const container = document.getElementById('ranking-content');
  const filtered = currentCategoria === 'todos'
    ? rankingData
    : rankingData.filter(r => r.categoria === currentCategoria);

  const rows = filtered.map(p => {
    const posClass = p.pos <= 3 ? 'pos-top' : '';
    const badgeClass = `badge-${p.categoria.toLowerCase()}`;
    
    let varHTML = `<span class="var-same">●</span>`;
    if (p.variacion > 0) varHTML = `<span class="var-up">▲ ${p.variacion}</span>`;
    if (p.variacion < 0) varHTML = `<span class="var-down">▼ ${Math.abs(p.variacion)}</span>`;

    return `
      <tr>
        <td class="pos-cell ${posClass}">${p.pos}</td>
        <td class="player-name">${p.nombre}</td>
        <td><span class="sector-badge ${badgeClass}">${p.categoria}</span></td>
        <td style="text-align:center">${varHTML}</td>
      </tr>`;
  }).join('');

  container.innerHTML = `
    <table class="ranking-table">
      <thead>
        <tr>
          <th style="text-align:right;padding-right:1rem">#</th>
          <th>Jugador</th>
          <th>Categoría</th>
          <th style="text-align:center">Var</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function populateFechaSelect() {
  const sel = document.getElementById('fecha-select');
  const fechas = [...new Set(resultadosData.map(r => r.fecha))].sort((a,b) => b-a);
  sel.innerHTML = fechas.map(f => `<option value="${f}">Fecha ${f}</option>`).join('');
  if (fechas.length > 0) {
      sel.value = fechas[0];
  }
}

function renderResultados() {
  const fecha = document.getElementById('fecha-select').value;
  const matches = resultadosData.filter(r => r.fecha === fecha);
  const container = document.getElementById('resultados-content');
  
  container.innerHTML = matches.map(m => {
    const gd = m.games_d !== null ? parseInt(m.games_d) : null;
    const ga = m.games_a !== null ? parseInt(m.games_a) : null;
    const hasScore = !isNaN(gd) && !isNaN(ga);
    const dWins = hasScore && gd > ga;
    const aWins = hasScore && ga > gd;
    
    return `
      <div class="match-card">
        <div class="match-players">
          <span class="player-pill ${aWins ? 'loser' : ''}">${m.desafiante}${dWins ? '<span class="winner-mark">✓</span>' : ''}</span>
          <span class="vs-sep">VS</span>
          <span class="player-pill ${dWins ? 'loser' : ''}">${m.aceptante}${aWins ? '<span class="winner-mark">✓</span>' : ''}</span>
        </div>
        <div class="match-score ${!hasScore?'pending':''}">${hasScore ? gd+'–'+ga : 'Pendiente'}</div>
      </div>`;
  }).join('');
}

function showCategoria(cat, btn) {
  currentCategoria = cat;
  document.querySelectorAll('.sector-btn').forEach(b => { b.className = 'sector-btn'; });
  if (cat === 'todos') btn.className = 'sector-btn active-a';
  else btn.className = `sector-btn active-${cat.toLowerCase()}`;
  renderRanking();
}

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function setSyncError() {
  document.getElementById('sync-dot').classList.remove('live');
  document.getElementById('sync-text').textContent = 'Error de conexión';
}

function setSyncOk() {
  document.getElementById('sync-dot').classList.add('live');
  const now = new Date();
  document.getElementById('sync-text').textContent = `Actualizado ${now.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'})}`;
}

async function loadAll() {
  await Promise.all([loadRanking(), loadResultados()]);
  setSyncOk();
}

loadAll();
setInterval(loadAll, 120000);
</script>
</body>
</html>
